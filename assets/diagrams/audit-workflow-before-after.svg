<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#B9B3A9"/>
    </marker>
    <marker id="arwA" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#D6336C"/>
    </marker>
    <pattern id="hatch" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#E0DAD1" stroke-width="3"/>
    </pattern>
  </defs>

  <rect width="1200" height="760" fill="#FBFAF7"/>

  <!-- ================= BEFORE ================= -->
  <text x="60" y="62" font-size="12" letter-spacing="1.6" fill="#6E6A78" font-family="'IBM Plex Mono', monospace">BEFORE</text>
  <text x="60" y="102" font-size="27" fill="#1C1B22" font-family="Fraunces, Georgia, serif">12+ hours, mostly outside the product</text>

  <!-- swimlane labels -->
  <text x="60" y="152" font-size="11" letter-spacing="1.2" fill="#9A948C" font-family="'IBM Plex Mono', monospace">AUDITOR</text>
  <text x="60" y="238" font-size="11" letter-spacing="1.2" fill="#9A948C" font-family="'IBM Plex Mono', monospace">OPS TEAM</text>
  <text x="60" y="324" font-size="11" letter-spacing="1.2" fill="#9A948C" font-family="'IBM Plex Mono', monospace">OUTSIDE</text>

  <line x1="60" y1="166" x2="1140" y2="166" stroke="#EDE9E3" stroke-width="1"/>
  <line x1="60" y1="252" x2="1140" y2="252" stroke="#EDE9E3" stroke-width="1"/>
  <line x1="60" y1="338" x2="1140" y2="338" stroke="#EDE9E3" stroke-width="1"/>

  <!-- product boundary (dashed) -->
  <rect x="150" y="126" width="1000" height="130" rx="10" fill="none" stroke="#D9D3CA" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="1140" y="120" font-size="10.5" letter-spacing="1.2" fill="#B0AAA1" text-anchor="end" font-family="'IBM Plex Mono', monospace">PRODUCT BOUNDARY</text>

  <!-- BEFORE steps -->
  <g>
    <rect x="168" y="130" width="128" height="52" rx="8" fill="#fff" stroke="#E8E4DE"/>
    <text x="232" y="153" font-size="13" fill="#1C1B22" text-anchor="middle">Create</text>
    <text x="232" y="169" font-size="13" fill="#1C1B22" text-anchor="middle">population ER</text>

    <rect x="330" y="130" width="128" height="52" rx="8" fill="#fff" stroke="#E8E4DE"/>
    <text x="394" y="153" font-size="13" fill="#1C1B22" text-anchor="middle">Receive full</text>
    <text x="394" y="169" font-size="13" fill="#1C1B22" text-anchor="middle">population</text>

    <rect x="492" y="130" width="128" height="52" rx="8" fill="#fff" stroke="#E8E4DE"/>
    <text x="556" y="161" font-size="13" fill="#1C1B22" text-anchor="middle">Create files</text>

    <rect x="654" y="216" width="128" height="52" rx="8" fill="#fff" stroke="#E8E4DE"/>
    <text x="718" y="247" font-size="13" fill="#1C1B22" text-anchor="middle">Seed population</text>

    <rect x="816" y="302" width="150" height="52" rx="8" fill="url(#hatch)" stroke="#D9D3CA"/>
    <text x="891" y="325" font-size="13" fill="#5C5850" text-anchor="middle">Random sample</text>
    <text x="891" y="341" font-size="13" fill="#5C5850" text-anchor="middle">in a spreadsheet</text>

    <rect x="1000" y="216" width="130" height="52" rx="8" fill="#fff" stroke="#E8E4DE"/>
    <text x="1065" y="247" font-size="13" fill="#1C1B22" text-anchor="middle">Re-upload</text>

    <!-- arrows -->
    <path d="M296,156 L326,156" stroke="#B9B3A9" stroke-width="1.4" fill="none" marker-end="url(#arw)"/>
    <path d="M458,156 L488,156" stroke="#B9B3A9" stroke-width="1.4" fill="none" marker-end="url(#arw)"/>
    <path d="M620,160 C645,160 654,190 654,238" stroke="#B9B3A9" stroke-width="1.4" fill="none" marker-end="url(#arw)"/>
    <path d="M782,246 C808,246 816,276 816,324" stroke="#B9B3A9" stroke-width="1.4" fill="none" marker-end="url(#arw)"/>
    <path d="M966,326 C990,326 1000,290 1000,246" stroke="#B9B3A9" stroke-width="1.4" fill="none" marker-end="url(#arw)"/>
  </g>

  <!-- source of truth, outside -->
  <rect x="816" y="386" width="150" height="44" rx="8" fill="none" stroke="#C9C2B8" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="891" y="413" font-size="12.5" fill="#8A847C" text-anchor="middle">source of truth lives here</text>
  <path d="M891,354 L891,382" stroke="#C9C2B8" stroke-width="1.4" fill="none" marker-end="url(#arw)"/>

  <text x="168" y="428" font-size="13.5" fill="#8A847C" font-style="italic" font-family="Fraunces, Georgia, serif">Five handoffs. Two teams. Nothing connected, so nothing stayed true.</text>

  <!-- divider -->
  <line x1="60" y1="472" x2="1140" y2="472" stroke="#E3DED7" stroke-width="1"/>

  <!-- ================= AFTER ================= -->
  <text x="60" y="524" font-size="12" letter-spacing="1.6" fill="#D6336C" font-family="'IBM Plex Mono', monospace">AFTER</text>
  <text x="60" y="564" font-size="27" fill="#1C1B22" font-family="Fraunces, Georgia, serif">One flow, inside the platform</text>

  <text x="60" y="614" font-size="11" letter-spacing="1.2" fill="#9A948C" font-family="'IBM Plex Mono', monospace">AUDITOR</text>
  <line x1="60" y1="628" x2="1140" y2="628" stroke="#EDE9E3" stroke-width="1"/>

  <rect x="150" y="588" width="1000" height="88" rx="10" fill="#FDF3F7" stroke="#F2CBDB" stroke-width="1.4"/>

  <g>
    <rect x="176" y="600" width="150" height="52" rx="8" fill="#fff" stroke="#E8E4DE"/>
    <text x="251" y="631" font-size="13" fill="#1C1B22" text-anchor="middle">Population ER</text>

    <rect x="366" y="600" width="150" height="52" rx="8" fill="#fff" stroke="#E8E4DE"/>
    <text x="441" y="623" font-size="13" fill="#1C1B22" text-anchor="middle">Sample created</text>
    <text x="441" y="639" font-size="13" fill="#1C1B22" text-anchor="middle">from population</text>

    <rect x="556" y="600" width="150" height="52" rx="8" fill="#fff" stroke="#E8E4DE"/>
    <text x="631" y="623" font-size="13" fill="#1C1B22" text-anchor="middle">Linked to</text>
    <text x="631" y="639" font-size="13" fill="#1C1B22" text-anchor="middle">sample ER</text>

    <rect x="746" y="600" width="150" height="52" rx="8" fill="#fff" stroke="#E8E4DE"/>
    <text x="821" y="623" font-size="13" fill="#1C1B22" text-anchor="middle">Automated testing</text>
    <text x="821" y="639" font-size="13" fill="#1C1B22" text-anchor="middle">AI + deterministic</text>

    <rect x="936" y="600" width="190" height="52" rx="8" fill="#1C1B22"/>
    <text x="1031" y="623" font-size="13" fill="#FBFAF7" text-anchor="middle">Database is the</text>
    <text x="1031" y="639" font-size="13" fill="#FBFAF7" text-anchor="middle">source of truth</text>

    <path d="M326,626 L362,626" stroke="#D6336C" stroke-width="1.6" fill="none" marker-end="url(#arwA)"/>
    <path d="M516,626 L552,626" stroke="#D6336C" stroke-width="1.6" fill="none" marker-end="url(#arwA)"/>
    <path d="M706,626 L742,626" stroke="#D6336C" stroke-width="1.6" fill="none" marker-end="url(#arwA)"/>
    <path d="M896,626 L932,626" stroke="#D6336C" stroke-width="1.6" fill="none" marker-end="url(#arwA)"/>
  </g>

  <text x="176" y="712" font-size="13.5" fill="#8A847C" font-style="italic" font-family="Fraunces, Georgia, serif">No handoffs. No ops team. It stays true on its own.</text>
  <text x="1140" y="712" font-size="12" letter-spacing="1.2" fill="#D6336C" text-anchor="end" font-family="'IBM Plex Mono', monospace">100% OF AUDITS</text>
</svg>
